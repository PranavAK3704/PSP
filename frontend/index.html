<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valmo Advocate · Ops Control Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: {
          colors: {
            "surface-variant": "#353435", "on-primary-container": "#747987",
            "on-primary-fixed-variant": "#414753", "on-surface-variant": "#c6c6cc",
            "secondary": "#ddfcff", "surface": "#131314", "surface-container-high": "#2a2a2b",
            "surface-container": "#201f20", "secondary-container": "#00f1fe",
            "on-background": "#e5e2e2", "surface-container-low": "#1c1b1c",
            "background": "#131314", "surface-bright": "#39393a", "outline-variant": "#45474b",
            "secondary-fixed": "#74f5ff", "primary": "#c1c6d5", "error": "#ffb4ab",
            "surface-container-lowest": "#0e0e0f", "on-surface": "#e5e2e2",
            "surface-container-highest": "#353435", "surface-dim": "#131314",
            "tertiary": "#00e475", "on-tertiary": "#003918", "on-secondary": "#00363a",
            "outline": "#909096", "warn": "#ffbf00",
          },
          fontFamily: {
            "body-base": ["Inter"], "headline-md": ["Inter"], "display-lg": ["Inter"],
            "data-mono": ["JetBrains Mono"], "headline-sm": ["Inter"], "label-caps": ["Inter"],
          },
          spacing: { unit: "4px", lg: "24px", sm: "8px", gutter: "20px", md: "16px", xs: "4px", xl: "48px" },
          borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        }},
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 20px; }
      .glass-card { background: rgba(32,31,32,0.4); backdrop-filter: blur(12px); border: 1px solid rgba(65,71,83,0.2); }
      .active-glass { background: rgba(53,52,53,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(0,241,254,0.2); }
      @keyframes scanning { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
      .scan-line { position: relative; overflow: hidden; }
      .scan-line::after { content:""; position:absolute; bottom:0; left:0; width:100%; height:1px;
        background: linear-gradient(90deg, transparent, #00f1fe, transparent); animation: scanning 3s linear infinite; }
      @keyframes pulsing { 0%,100% { opacity:1; border-color: rgba(255,180,171,0.8);} 50% { opacity:0.4; border-color: rgba(255,180,171,0.2);} }
      .pulse-border { animation: pulsing 2s cubic-bezier(0.4,0,0.6,1) infinite; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(144,144,150,0.3); border-radius: 2px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
  </head>
  <body class="bg-background text-on-surface antialiased overflow-hidden" style="font-family: Inter, sans-serif;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
