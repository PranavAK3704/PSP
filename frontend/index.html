<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valmo Advocate · Ops Control Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: { extend: {
          colors: {
            /* Palette: Stitch "Valmo Advocate Command Center" — Trust Blue accent, Partner Green,
               charcoal-navy surfaces. Token NAMES unchanged so every component reskins in place. */
            "surface-variant": "#2d3449", "on-primary-container": "#8c909f",
            "on-primary-fixed-variant": "#424754", "on-surface-variant": "#c2c6d6",
            "secondary": "#adc6ff", "surface": "#0b1326", "surface-container-high": "#222a3d",
            "surface-container": "#171f33", "secondary-container": "#4d8eff",
            "on-background": "#dae2fd", "surface-container-low": "#131b2e",
            "background": "#0b1326", "surface-bright": "#31394d", "outline-variant": "#424754",
            "secondary-fixed": "#d8e2ff", "primary": "#adc6ff", "error": "#ffb4ab",
            "surface-container-lowest": "#060e20", "on-surface": "#dae2fd",
            "surface-container-highest": "#2d3449", "surface-dim": "#0b1326",
            "tertiary": "#4edea3", "on-tertiary": "#002113", "on-secondary": "#002e6a",
            "outline": "#8c909f", "warn": "#ffb95f",
          },
          fontFamily: {
            "body-base": ["Inter"], "headline-md": ["Inter"], "display-lg": ["Inter"],
            "data-mono": ["JetBrains Mono"], "headline-sm": ["Inter"], "label-caps": ["Inter"],
          },
          spacing: { unit: "4px", lg: "24px", sm: "8px", gutter: "20px", md: "16px", xs: "4px", xl: "48px" },
          borderRadius: { DEFAULT: "0.125rem", lg: "0.25rem", xl: "0.5rem", full: "0.75rem" },
        }},
      };
    </script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 20px; }
      .glass-card { background: rgba(23,31,51,0.55); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
      .active-glass { background: rgba(34,42,61,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(77,142,255,0.3); }
      @keyframes scanning { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
      .scan-line { position: relative; overflow: hidden; }
      .scan-line::after { content:""; position:absolute; bottom:0; left:0; width:100%; height:1px;
        background: linear-gradient(90deg, transparent, #4d8eff, transparent); animation: scanning 3s linear infinite; }
      @keyframes pulsing { 0%,100% { opacity:1; border-color: rgba(255,180,171,0.8);} 50% { opacity:0.4; border-color: rgba(255,180,171,0.2);} }
      .pulse-border { animation: pulsing 2s cubic-bezier(0.4,0,0.6,1) infinite; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(144,144,150,0.3); border-radius: 2px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
  </head>
  <body class="bg-background text-on-surface antialiased overflow-hidden" style="font-family: Inter, sans-serif;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
