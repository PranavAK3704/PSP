<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valmo Advocate · Ops Control Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Tailwind is now compiled at build time (see tailwind.config.js + postcss.config.js);
         the runtime Play CDN was removed to eliminate the cold-start flash of unstyled content. -->
    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
    <style>
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; font-size: 20px; }
      .glass-card { background: rgba(23,31,51,0.55); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
      .active-glass { background: rgba(34,42,61,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(77,142,255,0.3); }
      @keyframes scanning { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
      .scan-line { position: relative; overflow: hidden; }
      .scan-line::after { content:""; position:absolute; bottom:0; left:0; width:100%; height:1px;
        background: linear-gradient(90deg, transparent, #4d8eff, transparent); animation: scanning 3s linear infinite; }
      @keyframes pulsing { 0%,100% { opacity:1; border-color: rgba(255,180,171,0.8);} 50% { opacity:0.4; border-color: rgba(255,180,171,0.2);} }
      .pulse-border { animation: pulsing 2s cubic-bezier(0.4,0,0.6,1) infinite; }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(144,144,150,0.3); border-radius: 2px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
  </head>
  <body class="bg-background text-on-surface antialiased overflow-hidden" style="font-family: Inter, sans-serif;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
