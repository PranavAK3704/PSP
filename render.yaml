# Render Blueprint — one Docker web service for the Valmo Partner Support Platform.
# The persistent disk at /data is PSP_STATE_DIR, so authored config (users, blueprints,
# KT queue, rubric/audits, ledger, traces, CPD) survives redeploys. Secrets are set in
# the Render dashboard (sync: false → never stored in git).
services:
  - type: web
    name: valmo-psp
    env: docker
    plan: free                 # free tier — no card required
    # NOTE (free tier): instance sleeps after ~15 min idle (slow first request), and there
    # is NO persistent disk, so authored state resets on redeploy — the losses brain, audit
    # rubric and INITIAL_ADMIN re-seed on boot. Upgrade to a paid plan + disk (or externalize
    # state to Turso) when the team authors for real.
    dockerfilePath: ./Dockerfile
    # $PORT is injected by Render automatically (the Dockerfile CMD reads it).
    healthCheckPath: /api/health
    envVars:
      # Durable state lives on the mounted disk (survives redeploys).
      - key: PSP_STATE_DIR
        value: /data          # ephemeral on free tier (no disk)
      # ── Dashboard-set secrets (never committed) ──
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
