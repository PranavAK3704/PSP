# Render Blueprint — one Docker web service for the Valmo Partner Support Platform.
# The persistent disk at /data is PSP_STATE_DIR, so authored config (users, blueprints,
# KT queue, rubric/audits, ledger, traces, CPD) survives redeploys. Secrets are set in
# the Render dashboard (sync: false → never stored in git).
services:
  - type: web
    name: valmo-psp
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    # $PORT is injected by Render automatically (the Dockerfile CMD reads it).
    healthCheckPath: /api/health
    disk:
      name: psp-state
      mountPath: /data
      sizeGB: 1
    envVars:
      # Durable state lives on the mounted disk (survives redeploys).
      - key: PSP_STATE_DIR
        value: /data
      # ── Dashboard-set secrets (never committed) ──
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
